[project]
name = "vscout"
version = "0.1.0"
description = "V-SCOUT: Valorant scouting web app with event timeline and analysis"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    # === Core: valoscribe for VOD analysis ===
    "valoscribe",

    # === Web framework ===
    "fastapi>=0.128.0",
    "uvicorn>=0.40.0",
    "python-multipart>=0.0.21",

    # === Report generation ===
    "markdown>=3.5.0",
    "pyyaml>=6.0",
]

[project.scripts]
vscout = "vscout.server:main"

[tool.uv.sources]
valoscribe = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vscout"]
