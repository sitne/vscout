[project]
name = "valoscribe"
version = "0.1.0"
description = "Computer vision pipeline for analyzing Valorant esports VODs"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "opencv-python>=4.8.0",
    "numpy>=1.24.0",
    "pydantic>=2.0.0",
    "typer>=0.9.0",
    "pytesseract>=0.3.10",  # OCR for killfeed
    "pillow>=10.0.0",  # Image processing utilities
    "yt-dlp>=2023.0.0",  # YouTube video downloading
    "tqdm>=4.66.0",  # Progress bars
    "beautifulsoup4>=4.12.0",  # HTML parsing for VLR scraper
    "requests>=2.31.0",  # HTTP requests for VLR scraper
    "playwright>=1.40.0",  # Browser automation for VLR scraper
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "mypy>=1.5.0",
    "ruff>=0.1.0",  # Fast linter/formatter from Astral
]

[project.scripts]
valoscribe = "valoscribe.__main__:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = []

[tool.mypy]
python_version = "3.10"
strict = false
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Start lenient, can tighten later
